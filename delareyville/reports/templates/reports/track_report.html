{% load static %}

<html>
<head>
<style>
body {
    background-image: url("{% static 'images/P9-Tswaing-local-municipality.jpg' %}");
    background-size: cover;
    margin: 0;
    font-family: Arial;
}

.navbar {
    background-color: rgba(0,0,0,0.7);
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
    padding: 10px 15px;
    border: 1px solid white;
    border-radius: 5px;
}

.navbar a:hover {
    background-color: white;
    color: black;
}

.container {
    text-align: center;
    margin-top: 50px;
    padding: 20px;
}

.search-form {
    background-color: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 8px;
    max-width: 500px;
    margin: 0 auto;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

h2 {
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

label {
    display: block;
    text-align: left;
    margin-bottom: 5px;
    font-weight: bold;
    color: #333;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #007BFF;
    color: white;
    cursor: pointer;
    font-weight: bold;
    border: none;
    border-radius: 4px;
}

button:hover {
    background-color: #0056b3;
}

.report-result {
    background-color: rgba(255, 255, 255, 0.95);
    padding: 20px;
    border-radius: 8px;
    max-width: 600px;
    margin: 20px auto;
    border-left: 5px solid #007BFF;
    display: none;
}

.report-result.show {
    display: block;
}

.report-result h3 {
    color: #333;
    margin-top: 0;
}

.report-result p {
    color: #555;
    text-align: left;
}

.status-pending {
    background-color: #fff3cd;
    color: #856404;
    padding: 5px 10px;
    border-radius: 4px;
    display: inline-block;
}

.status-completed {
    background-color: #d4edda;
    color: #155724;
    padding: 5px 10px;
    border-radius: 4px;
    display: inline-block;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/report/">Report Issue</a>
    <a href="/about/">About Us</a>
    <a href="/contact/">Contact Us</a>
    <a href="/logout/">Logout</a>
</div>

<div class="container">
    <h2>Track Your Report</h2>

    <div class="search-form">
        <label for="report_id">Enter Your Report ID:</label>
        <input type="text" id="report_id" placeholder="e.g., RPT-001234" required>
        <button onclick="trackReport()">Search Report</button>
    </div>

    <div id="reportResult" class="report-result">
        <h3>Report Details</h3>
        <p><strong>Report ID:</strong> <span id="result_id"></span></p>
        <p><strong>Issue Type:</strong> <span id="result_issue"></span></p>
        <p><strong>Status:</strong> <span id="result_status"></span></p>
        <p><strong>Submitted Date:</strong> <span id="result_date"></span></p>
        <p><strong>Last Updated:</strong> <span id="result_updated"></span></p>
        <p><strong>Notes:</strong> <span id="result_notes"></span></p>
    </div>
</div>

<script>
function trackReport() {
    const reportId = document.getElementById('report_id').value;
    
    if (!reportId) {
        alert('Please enter a Report ID');
        return;
    }

    // Simulate API response with fake data
    const mockReports = {
        'RPT-001234': {
            issue: 'Water Leak',
            status: 'In Progress',
            date: '2026-03-25',
            updated: '2026-03-28',
            notes: 'Team has been notified. Repair will begin next week.'
        },
        'RPT-001235': {
            issue: 'Pothole',
            status: 'Completed',
            date: '2026-03-20',
            updated: '2026-03-26',
            notes: 'Road repair completed successfully.'
        },
        'RPT-001236': {
            issue: 'Electricity Fault',
            status: 'Pending',
            date: '2026-03-27',
            updated: '2026-03-27',
            notes: 'Report received. Awaiting assessment by electrical team.'
        }
    };

    if (mockReports[reportId]) {
        const report = mockReports[reportId];
        document.getElementById('result_id').textContent = reportId;
        document.getElementById('result_issue').textContent = report.issue;
        document.getElementById('result_date').textContent = report.date;
        document.getElementById('result_updated').textContent = report.updated;
        document.getElementById('result_notes').textContent = report.notes;
        
        const statusSpan = document.getElementById('result_status');
        statusSpan.textContent = report.status;
        statusSpan.className = report.status === 'Completed' ? 'status-completed' : 
                              report.status === 'In Progress' ? 'status-pending' : 'status-pending';
        
        document.getElementById('reportResult').classList.add('show');
    } else {
        alert('Report ID not found. Please check and try again.\n\nDemo IDs: RPT-001234, RPT-001235, RPT-001236');
        document.getElementById('reportResult').classList.remove('show');
    }
}

// Allow searching on Enter key
document.getElementById('report_id').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        trackReport();
    }
});
</script>

</body>
</html>
