{% load static %}

<html>
<head>
<style>
body {
    background-image: url("{% static 'images/P9-Tswaing-local-municipality.jpg' %}");
    background-size: cover;
    margin: 0;
    font-family: Arial;
}

/* NAVBAR */
.navbar {
    background-color: rgba(0,0,0,0.7);
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
    padding: 10px 15px;
    border: 1px solid white;
    border-radius: 5px;
}

.navbar a:hover {
    background-color: white;
    color: black;
}

/* MAIN CONTENT */
.container {
    text-align: center;
    margin-top: 50px;
    padding: 20px;
}

form {
    background-color: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 8px;
    max-width: 500px;
    margin: 0 auto;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

h2 {
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

label {
    display: block;
    margin-bottom: 10px;
    font-weight: bold;
    color: #333;
    text-align: left;
}

select, textarea, button {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    box-sizing: border-box;
}

button {
    background-color: #007BFF;
    color: white;
    cursor: pointer;
    font-weight: bold;
    border: none;
}

button:hover {
    background-color: #0056b3;
}

/* SUCCESS TOAST */
.toast {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #28a745;
    color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    z-index: 9999;
    min-width: 300px;
}

.toast.show {
    display: block;
    animation: slideIn 0.3s ease-in-out;
}

@keyframes slideIn {
    from {
        transform: translateX(400px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.track-btn {
    background-color: #28a745;
    margin-top: 10px;
}

.track-btn:hover {
    background-color: #218838;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/">Home</a>
    <a href="/report/">Report Issue</a>
    <a href="/about/">About Us</a>
    <a href="/contact/">Contact Us</a>
    <a href="/logout/">Logout</a>
</div>

<!-- CONTENT -->
<div class="container">
    <h2>Report Issue</h2>

    <form method="POST" id="reportForm">
        {% csrf_token %}
        <label for="issue_type">Issue Type:</label>
        <select name="issue_type" id="issue_type" required>
            <option value="">-- Select an Issue Type --</option>
            <option value="water_leak">Water Leaks</option>
            <option value="electricity_fault">Electricity Faults</option>
            <option value="pothole">Potholes</option>
            <option value="waste_collection">Waste Collection Problems</option>
        </select>

        <label for="description">Description of Issue:</label>
        <textarea name="description" id="description" rows="6" placeholder="Please describe the issue in detail..." required></textarea>

        <button type="submit">Submit Report</button>
        <a href="/track-report/" class="track-btn" style="width: 100%; text-align: center; display: inline-block; padding: 10px; color: white; text-decoration: none; border-radius: 4px;">Track Report</a>
    </form>
</div>

<!-- SUCCESS TOAST -->
<div id="successToast" class="toast">
    <strong>✓ Success!</strong><br>
    Your report has been successfully submitted.<br>
    We will send you an email or SMS with updates.
</div>

<script>
    // Show success message if form was submitted
    {% if success %}
    document.addEventListener('DOMContentLoaded', function() {
        const toast = document.getElementById('successToast');
        toast.classList.add('show');
        
        // Reset form
        document.getElementById('reportForm').reset();
        
        // Hide toast after 5 seconds
        setTimeout(function() {
            toast.classList.remove('show');
        }, 5000);
    });
    {% endif %}
</script>

</body>
</html>
