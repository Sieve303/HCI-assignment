{% load static %}

<html>
<head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-image: url("{% static 'images/P9-Tswaing-local-municipality.jpg' %}");
    background-size: cover;
    background-attachment: fixed;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(20, 20, 40, 0.9) 100%);
    padding: 20px 0;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
    border-bottom: 2px solid #007BFF;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 6px;
    transition: all 0.3s ease;
    border: 2px solid transparent;
    font-size: 15px;
}

.navbar a:hover {
    background-color: #007BFF;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.4);
}

.navbar a:active {
    transform: translateY(0);
}

/* MAIN CONTENT */
.container {
    text-align: center;
    margin-top: 120px;
    color: white;
    padding: 20px;
}

.container h1 {
    font-size: 48px;
    margin-bottom: 20px;
    text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
    animation: fadeInDown 0.8s ease;
}

.container p {
    font-size: 20px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
    animation: fadeInUp 0.8s ease 0.2s both;
}

@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.btn {
    display: inline-block;
    margin: 20px;
    padding: 15px 25px;
    background-color: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

.btn:hover {
    background-color: #0056b3;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/">Home</a>
    {% if request.session.user %}
        <a href="/report/">Report Issue</a>
    {% endif %}
    <a href="/about/">About Us</a>
    <a href="/contact/">Contact Us</a>
    {% if not request.session.user %}
        <a href="/users/login/">Sign In</a>
        <a href="/users/signup/">Sign Up</a>
    {% else %}
        <a href="/users/logout/">Sign Out</a>
    {% endif %}
</div>

<!-- CONTENT -->
<div class="container">
    <h1>Delareyville Service Reporter</h1>
    <p style="color: white; font-size: 18px;">Login or Sign Up to report service issues</p>
</div>

</body>
</html>
