{% load static %}

<html>
<head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-image: url("{% static 'images/P9-Tswaing-local-municipality.jpg' %}");
    background-size: cover;
    background-attachment: fixed;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
}

.navbar {
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(20, 20, 40, 0.9) 100%);
    padding: 20px 0;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
    border-bottom: 2px solid #007BFF;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 6px;
    transition: all 0.3s ease;
    border: 2px solid transparent;
    font-size: 15px;
}

.navbar a:hover {
    background-color: #007BFF;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.4);
}

.navbar a:active {
    transform: translateY(0);
}

.container {
    text-align: center;
    margin-top: 80px;
    padding: 20px;
}

form {
    background-color: rgba(255, 255, 255, 0.97);
    padding: 40px;
    border-radius: 12px;
    max-width: 450px;
    margin: 0 auto;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 123, 255, 0.3);
}

h2 {
    color: #333;
    margin-bottom: 30px;
    font-size: 28px;
}

label {
    display: block;
    text-align: left;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
    transition: border-color 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #007BFF;
    box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #007BFF 0%, #0056b3 100%);
    color: white;
    cursor: pointer;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0, 123, 255, 0.4);
}

button:active {
    transform: translateY(0);
}

p {
    color: white;
    text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
    margin-top: 20px;
    font-size: 15px;
}

a {
    color: #007BFF;
    text-decoration: none;
    font-weight: 600;
}

a:hover {
    text-decoration: underline;
    color: #0056b3;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/about/">About Us</a>
    <a href="/contact/">Contact Us</a>
    <a href="/users/login/">Sign In</a>
</div>
    <a href="/users/signup/">Sign Up</a>
</div>

<div class="container">
    <h2>Sign Up</h2>

    <form method="POST">
        {% csrf_token %}
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter a password" required>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/users/login/">Sign in here</a></p>
</div>

</body>
</html>
